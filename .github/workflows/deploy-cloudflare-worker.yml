name: Deploy Cloudflare Worker

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # El deploy va antes que los secretos a propósito: wrangler.toml ya no
      # define [vars], así que este paso elimina las variables en claro que
      # había. Sin eso, subir un secreto con el mismo nombre falla con
      # "Binding name already in use".
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy

      # Se suben cifrados con `wrangler secret bulk`. Persisten entre despliegues.
      - name: Upload encrypted secrets
        run: |
          jq -n --arg resend "$RESEND_API_KEY" --arg turnstile "$TURNSTILE_SECRET_KEY" \
            '{RESEND_API_KEY: $resend, TURNSTILE_SECRET_KEY: $turnstile}' \
            | npx wrangler secret bulk
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
