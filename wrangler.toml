name = "lucasvicente-es"
main = "worker/index.ts"
compatibility_date = "2026-02-16"
workers_dev = false

routes = [
  { pattern = "lucasvicente.es/*", zone_name = "lucasvicente.es" },
  { pattern = "www.lucasvicente.es/*", zone_name = "lucasvicente.es" }
]

[assets]
directory = "./dist"
binding = "ASSETS"
# Obliga a que el Worker atienda cada peticion. Sin esto Cloudflare sirve los
# assets directamente y las cabeceras de seguridad del Worker nunca se aplican.
run_worker_first = true

# [vars] — se inyectan como secrets desde GitHub Actions (ver workflow)
