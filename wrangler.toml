name = "lucasvicente-es"
main = "worker/index.ts"
compatibility_date = "2026-02-16"
workers_dev = false

routes = [
  { pattern = "lucasvicente.es/*", zone_name = "lucasvicente.es" },
  { pattern = "www.lucasvicente.es/*", zone_name = "lucasvicente.es" }
]

[assets]
directory = "./dist"
binding = "ASSETS"

# Secrets (configurar con `wrangler secret put <NAME>`):
#   RESEND_API_KEY        — API key de Resend
#   TURNSTILE_SECRET_KEY  — Secret key de Cloudflare Turnstile
